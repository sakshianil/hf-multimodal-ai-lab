  <text x="85" y="150" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#111827">1. Speech-to-text transcription</text>
  <text x="85" y="188" font-family="Noto Sans Devanagari, Arial, sans-serif" font-size="20" fill="#111827">आगो जब तुम साजना आओगा फूल खिलेंगे बरसिया सावन झूम झूम</text>
  <text x="550" y="265" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#111827">2. Generated image output</text>
  <image x="326" y="295" width="448" height="448" preserveAspectRatio="xMidYMid meet" href="data:image/jpeg;base64,"/>
