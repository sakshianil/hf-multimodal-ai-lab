<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="760" viewBox="0 0 1100 760">
  <rect width="1100" height="760" fill="#ffffff"/>
  <text x="550" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#111827">Audio → Text → Image Generation</text>
  <text x="550" y="78" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#4b5563">Hindi singing audio was transcribed and used as the signal for image generation.</text>
